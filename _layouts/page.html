---
layout: default
---
{%- include header.html -%}
<!-- Main -->
<div id="main">
	<!-- Page -->
	<article class="shade-two page-reading">
	  <div class="reading-hero">
	    <div class="container">
			<header class="reading-hero__header">
				<h2>{{- page.title -}}</h2>
				{%- if page.subtitle -%}<p>{{- page.subtitle -}}</p>{%- endif -%}
			</header>
	    </div>
	  </div>
	  <div class="container reading-body">
	    {{- content -}}
	  </div>
	</article>
</div>
